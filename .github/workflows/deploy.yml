name: Sentinel CD Auto-Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy-infrastructure-and-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/sentinel_key
          chmod 600 ~/.ssh/sentinel_key
          ssh-keygen -y -f ~/.ssh/sentinel_key > ~/.ssh/sentinel_key.pub

      - name: Setup terraform 
        uses: hashicorp/setup-terraform@v2

      - name: Terraform init & apply
        working-directory: ./infra
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get EC2 ip address
        id: get-ip
        working-directory: ./infra
        run: |
          echo "EC2_IP=$(terraform output -raw server_public_ip)" >> $GITHUB_ENV

      - name: Run ansible to deploy app
        working-directory: ./ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          echo "${{ env.EC2_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/sentinel_key" > inventory.ini
          ansible-playbook -i inventory.ini setup.yml
